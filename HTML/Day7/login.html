<!DOCTYPE html>
<html>
  <head>
    <title>Login and Signup Form</title>
  </head>

  <body>

    <center>
      <h1>User Login and Signup Page</h1>
      <p>Please enter your details below</p>
    </center>

    <br>

    <section>
      <div border="1">

        <fieldset>
          <legend><h2>Login Form</h2></legend>

          <form>

            <label><b>Email</b></label><br />
            <input
              type="email"
              name="email"
              placeholder="Enter your email"
              required
            />
            <br /><br />

            <label><b>Password</b></label><br />
            <input
              type="password"
              name="password"
              placeholder="Enter password"
              minlength="6"
              maxlength="12"
              required
            />
            <br /><br />

            <input type="submit" value="Login" />
            <input type="reset" value="Clear" />

          </form>

        </fieldset>

      </div>
    </section>

    <br><br>

    <section>
      <div>

        <fieldset>
          <legend><h2>Signup Form</h2></legend>

          <form>

            <label><b>Full Name</b></label><br />
            <input
              type="text"
              name="fullname"
              placeholder="Enter full name"
              minlength="3"
              maxlength="20"
              required
            />
            <br /><br />

            <label><b>Email</b></label><br />
            <input
              type="email"
              name="signupEmail"
              placeholder="Enter your email"
              required
            />
            <br /><br />

            <label><b>Password</b></label><br />
            <input
              type="password"
              name="signupPassword"
              placeholder="Create password"
              minlength="6"
              maxlength="12"
              required
            />
            <br /><br />

            <label><b>Phone Number</b></label><br />
            <input
              type="tel"
              name="phone"
              placeholder="Enter phone number"
              minlength="10"
              maxlength="10"
              required
            />
            <br /><br />

            <label><b>Gender</b></label><br />
            <input type="radio" name="gender" required /> Male
            <input type="radio" name="gender" /> Female
            <br /><br />

            <label><b>Skills</b></label><br />
            <input type="checkbox" name="html" /> HTML
            <input type="checkbox" name="css" /> CSS
            <input type="checkbox" name="js" /> JavaScript
            <br /><br />

            <label><b>Address</b></label><br />
            <textarea
              name="address"
              rows="5"
              cols="30"
              placeholder="Enter your address"
              required
            ></textarea>
            <br /><br />

            <input type="submit" value="Signup" />
            <input type="reset" value="Clear" />

          </form>

        </fieldset>

      </div>
    </section>

  </body>
</html>
