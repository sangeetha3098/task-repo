<html>
  <head>
    <title>Avengers Team Registration Form</title>
  </head>
  <center>
    <body bgcolor="lightblue">
      <section>
        <h1>Avengers Team Registration Form</h1>

        <form>
          <fieldset>
            <legend><h2>Hero Details</h2></legend>

            <label>Hero Name</label><br />
            <input
              type="text"
              name="heroName"
              placeholder="Enter your hero name"
              maxlength="20"
              required
            />
            <br /><br />

            <label>Real Name</label><br />
            <input
              type="text"
              name="realName"
              placeholder="Enter your real name"
              maxlength="20"
              required
            />
            <br /><br />

            <label>Email Address</label><br />
            <input
              type="email"
              name="email"
              placeholder="Enter your email"
              required
            />
            <br /><br />

            <label>Mobile Number</label><br />
            <input
              type="tel"
              name="mobile"
              placeholder="Enter phone number"
              minlength="10"
              maxlength="10"
              required
            />
            <br /><br />

            <label>Age</label><br />
            <input
              type="number"
              name="age"
              placeholder="Enter your age"
              min="18"
              max="60"
              required
            />
            <br /><br />

            <label>Select Joining Date</label><br />
            <input type="date" name="joiningDate" required />
            <br /><br />

            <label>Select Training Month</label><br />
            <input type="month" name="trainingMonth" />
            <br /><br />

            <label>Mission Date and Time</label><br />
            <input type="datetime-local" name="missionDateTime" />
            <br /><br />
          </fieldset>

          <br />

          <fieldset>
            <legend><h2>Power Selection</h2></legend>

            <label>Select Your Power</label><br /><br />

            <input type="radio" name="power" required />
            <label>Flying</label>

            <input type="radio" name="power" />
            <label>Super Speed</label>

            <input type="radio" name="power" />
            <label>Super Strength</label>

            <br /><br />

            <label>Select Your Skills</label><br /><br />

            <input type="checkbox" name="skills" />
            <label>Fighting</label>

            <input type="checkbox" name="skills" />
            <label>Technology</label>

            <input type="checkbox" name="skills" />
            <label>Space Travel</label>

            <br /><br />
          </fieldset>

          <br />

          <fieldset>
            <legend><h2>Additional Details</h2></legend>

            <label>Upload Your Hero Costume</label><br />
            <input type="file" name="costume" required />
            <br /><br />

            <label>Team Name</label><br />
            <input type="text" name="teamName" value="Avengers" readonly />
            <br /><br />

            <label>Why Should We Select You?</label><br />
            <textarea
              name="reason"
              rows="6"
              cols="40"
              placeholder="Explain your superhero abilities"
              minlength="20"
              maxlength="200"
              required
            ></textarea>
            <br /><br />

            <label>Emergency Contact</label><br />
            <input
              type="tel"
              name="emergencyContact"
              placeholder="Emergency phone number"
              minlength="10"
              maxlength="10"
              required
            />
            <br /><br />

            <label>Secret Nick Name</label><br />
            <input
              type="text"
              name="nickname"
              value="Unknown Hero"
              maxlength="15"
            />
            <br /><br />
          </fieldset>

          <br />

          <input type="submit" />

          <input type="reset" />
        </form>
      </section>
    </body>
  </center>
</html>
