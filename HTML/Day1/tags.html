1.Self closing Tags:
Self-closing tags do not need a separate closing tag because they don’t wrap content.

Example:
<br />
<hr />
<img />
<input />
<meta />
<link />
<source />
<track />
<area />
<base />
<col />
<embed />
<param />


2. Closing Tags:
Closing tags are used to end an HTML element.

Example:
<p></p>
<h1></h1>
<h2></h2>
<h3></h3>
<h4></h4>
<h5></h5>
<h6></h6>
<div></div>
<span></span>
<section></section>
<article></article>
<header></header>
<footer></footer>
<nav></nav>
<main></main>
<aside></aside>

3.Empty Tags:
Empty tags are tags that do not contain any content inside them.

Example:
<br>
<hr>
<img>
<input>
<meta>
<link>
