<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Iframe Example</title>
  </head>

  <body>
    <section>
      <div>
        <h1>Using Iframe in HTML</h1>

        <h2>YouTube Video</h2>
        <iframe
          width="560"
          height="315"
          src="https://www.youtube.com/embed/BHACKCNDMW8?si=fwXaR2UshYxJodak"
          title="YouTube video player"
          frameborder="0"
          allow="
            accelerometer;
            autoplay;
            clipboard-write;
            encrypted-media;
            gyroscope;
            picture-in-picture;
            web-share;
          "
          referrerpolicy="strict-origin-when-cross-origin"
          allowfullscreen
        ></iframe>
        <p>
          The above iframe displays a YouTube video directly inside the webpage.
        </p>

        <h2>Google Map</h2>

        <iframe
          width="800"
          height="300"
          frameborder="0"
          scrolling="no"
          marginheight="0"
          marginwidth="0"
          src="https://maps.google.com/maps?width=600&amp;height=400&amp;hl=en&amp;q=pondicherry&amp;t=&amp;z=14&amp;ie=UTF8&amp;iwloc=B&amp;output=embed"
        ></iframe>
      </div>
    </section>
  </body>
</html>
