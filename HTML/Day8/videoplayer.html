<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Video Player Example</title>
  </head>

  <body>
    <section>
      <div>
        <h1>Video Player Using Poster, Autoplay, Muted, and Loop</h1>

        <video width="700" poster="thumbnail.jpg" autoplay muted loop controls>
          <source src="../assets/video/video.mp4" type="video/mp4" />

          Your browser does not support the video tag.
        </video>
      </div>
    </section>
  </body>
</html>
