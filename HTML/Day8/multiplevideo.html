<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />

    <title>Video Format</title>
  </head>

  <body>
    <section>
      <div>
        <h1>Video format</h1>
        <h2>MP4</h2>

        </video>
        <br />
        <h2>WEBM</h2>
        <video width="600" controls loop>
          <source src="../assets/video/video2.webm" type="video/webm" />
        </video>
      </div>
    </section>
  </body>
</html>
