<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Audio Formats</title>
  </head>

  <body>
    <section>
      <div>
        <h1>Audio Format</h1>

        <p>
          HTML allows developers to use multiple source tags inside the audio
          element so the browser can choose a supported audio format
          automatically. This improves compatibility across different browsers
          and devices.
        </p>
        <h2>MP3</h2>
        <audio controls>
          <source src="../assets/audio/audio.mp3" type="audio/mp3" />
        </audio>
        <br />
        <h2>WAV</h2>
        <audio controls>
          <source src="../assets/audio/nature.wav" type="audio/wav" />
        </audio>
      </div>
    </section>
  </body>
</html>
